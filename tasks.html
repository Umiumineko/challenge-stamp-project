<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>タスク選択</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

.task-btn {
  display: block;
  width: 80%;
  max-width: 300px;
  margin: 10px auto;
  padding: 15px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background-color: #4CAF50;
  color: white;
}
</style>
</head>

<body>

<h1>やりたいチャレンジをえらぼう！</h1>

<button class="task-btn" onclick="selectTask('あさじゅんびをする')">
  あさじゅんびをする
</button>

<button class="task-btn" onclick="selectTask('10ぷんべんきょうする')">
  10ぷんべんきょうする
</button>

<button class="task-btn" onclick="selectTask('うんどうをする')">
  うんどうをする
</button>

<script>
// ユーザーID取得（ログイン時に保存されている想定）
function getUserId() {
  const userId = localStorage.getItem("userId");

  if (!userId) {
    alert("ログインしてください");
    location.href = "/login.html";
  }

  return userId;
}

// タスク選択 → API保存
async function selectTask(taskName) {
  const userId = getUserId();

  try {
    const res = await fetch("/api/set-task", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user: userId,
        task: taskName
      })
    });

    if (!res.ok) {
      throw new Error("保存に失敗");
    }

    // 保存成功 → challenge画面へ
    location.href = "/challenge.html";

  } catch (error) {
    alert("エラーが発生しました");
    console.error(error);
  }
}
</script>

</body>
</html>
