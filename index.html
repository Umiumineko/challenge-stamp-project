<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>チャレンジスタンププロジェクト</title>

<meta name="description" content="チャレンジスタンププロジェクトは、小学生が毎日の行動や学習に楽しく取り組める個人制作の学習支援サイトです。スタンプ形式で習慣づくりを応援します。">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 40px;
}

h1 {
  margin-bottom: 20px;
}

input {
  padding: 10px;
  font-size: 16px;
  width: 200px;
  margin-bottom: 20px;
}

button {
  padding: 12px 24px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background-color: #4CAF50;
  color: white;
}
</style>
</head>

<body>

<h1>チャレンジスタンプ</h1>

<p>ログインコードを入力してください</p>

<input type="text" id="code" placeholder="例：A123">

<br>

<button onclick="login()">ログイン</button>

<script>
function login() {
  const code = document.getElementById("code").value.trim();

  if (!code) {
    alert("コードを入力してください");
    return;
  }

  // ✅ ここが超重要（これがなかったのが原因）
  localStorage.setItem("userId", code);

  // 次の画面へ
  location.href = "/challenge.html";
}
</script>

</body>
</html>
