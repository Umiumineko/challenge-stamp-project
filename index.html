<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="このサイトは小学生向けの学習チャレンジを提供します。">
</head>

  <title>チャレンジスタンプ</title>
  <style>
    body {
      font-family: "Hiragino Maru Gothic ProN", "Rounded Mplus 1c", Arial, sans-serif;
      background: #fff7e6;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 30px 20px;
      width: 90%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h1 { font-size: 26px; }
    p { color: #555; }
    input {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      background: #ffb703;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🌟チャレンジスタンプ🌟</h1>
  <p>だいじな 2つを いれてね</p>

  <input id="number" type="number" placeholder="しゅっせきばんごう">
  <input id="code" type="text" placeholder="ログインコード">

  <button onclick="login()">はじめる</button>
</div>

<script>
async function login() {
  const number = document.getElementById('number').value.trim();
  const code = document.getElementById('code').value.trim();

  if (!number || !code) {
    alert('2つとも いれてね');
    return;
  }

  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ number, code })
  });

  const data = await res.json();

  if (data.ok) {
    location.href = '/challenge.html';
  } else {
    alert('ちがうみたい… もういちど たしかめてね');
  }
}
</script>

</body>
</html>
