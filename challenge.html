<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>今日のチャレンジ</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
}

/* 課題表示 */
.task-box {
  margin-top: 40px;
  font-size: 20px;
}

/* ボタン */
.complete-btn {
  margin-top: 30px;
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background-color: #4CAF50;
  color: white;
}

/* 完了画面 */
.complete-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);

  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.hidden {
  display: none;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 80%;
  max-width: 320px;
  z-index: 2;
}

.emoji {
  font-size: 60px;
}

.stamp {
  font-size: 60px;
  margin: 20px 0;
  animation: pop 0.4s ease;
}

@keyframes pop {
  0% { transform: scale(0.5); }
  100% { transform: scale(1); }
}

/* 紙吹雪 */
.confetti {
  position: absolute;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(720deg);
  }
}
</style>
</head>

<body>

<h1>今日のチャレンジ</h1>

<div class="task-box">
  <strong id="task">読み込み中...</strong>
</div>

<button class="complete-btn" onclick="completeTask()">
  できた！
</button>

<!-- 🎉 完了画面 -->
<div id="completeScreen" class="complete-screen hidden">
  <div class="card">
    <div class="emoji">🎉</div>
    <h2>やったね！</h2>
    <div class="stamp">⭐</div>
    <p>チャレンジクリア！</p>
    <button onclick="closeComplete()">OK</button>
  </div>
</div>

<script>
// ユーザーID取得
function getUserId() {
  const userId = localStorage.getItem("userId");

  if (!userId) {
    alert("ログインしてください");
    location.href = "/login.html";
  }

  return userId;
}

// タスク読み込み
async function loadTask() {
  const userId = getUserId();

  try {
    const res = await fetch(`/api/get-task?user=${userId}`);
    const data = await res.json();

    if (!data.task) {
      // 未設定なら選択画面へ
      location.href = "/tasks.html";
      return;
    }

    document.getElementById("task").textContent = data.task;

  } catch (e) {
    console.error(e);
    alert("読み込みエラー");
  }
}

// 完了ボタン
function completeTask() {
  showComplete();

  // 👉 将来ここで「完了記録API」も呼べる
  // fetch("/api/complete-task", ...)
}

// 完了画面表示
function showComplete() {
  const screen = document.getElementById("completeScreen");
  screen.classList.remove("hidden");

  createConfetti();
}

// 閉じる
function closeComplete() {
  document.getElementById("completeScreen").classList.add("hidden");
}

// 紙吹雪
function createConfetti() {
  const screen = document.getElementById("completeScreen");

  for (let i = 0; i < 50; i++) {
    const confetti = document.createElement("div");
    confetti.classList.add("confetti");

    confetti.style.left = Math.random() * 100 + "%";

    const colors = ["#f44336", "#e91e63", "#9c27b0", "#2196f3", "#4CAF50", "#FFC107"];
    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

    confetti.style.animationDuration = (Math.random() * 2 + 2) + "s";

    screen.appendChild(confetti);

    setTimeout(() => confetti.remove(), 3000);
  }
}

// 初期読み込み
loadTask();
</script>

</body>
</html>
