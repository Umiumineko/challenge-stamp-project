<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>チャレンジ</title>

<style>

body{
    margin:0;
    font-family:"Yu Gothic","Hiragino Sans",sans-serif;
    background:linear-gradient(to bottom,#f8fbff,#ffffff);
}

header{
    text-align:center;
    padding:30px 20px;
}

h1{
    color:#333;
}

#container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

.task-card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 5px 12px rgba(0,0,0,0.08);
}

.task-title{
    font-size:1.6rem;
    font-weight:bold;
    margin-bottom:30px;
    color:#333;
}

.field{
    margin-bottom:25px;
}

label{
    display:block;
    font-size:1.1rem;
    margin-bottom:8px;
    font-weight:bold;
}

input[type="text"],
textarea{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    border:2px solid #ddd;
    border-radius:12px;
    font-size:1rem;
}

textarea{
    min-height:120px;
}

input[type="file"]{
    margin-top:8px;
}

.complete-button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    background:#4CAF50;
    color:white;
    font-size:1.2rem;
    cursor:pointer;
}

.complete-button:hover{
    background:#43a047;
}

.back-button{
    display:inline-block;
    margin-bottom:20px;
    text-decoration:none;
    color:#333;
}

.loading{
    text-align:center;
    font-size:1.2rem;
    color:#666;
}

</style>
</head>

<body>

<header>
    <h1>🌟 チャレンジ 🌟</h1>
</header>

<div id="container">

    <div class="loading">
        よみこみちゅう...
    </div>

</div>

<script>

async function loadChallenge(){

    const params = new URLSearchParams(location.search);

    const id = Number(params.get("id"));

    try{

        const response = await fetch("/tasks.json");
        const tasks = await response.json();

        const task =
            tasks.find(t => t.id === id);

        if(!task){

            document.getElementById("container").innerHTML =
                "チャレンジが見つかりません";
            return;
        }

        const container =
            document.getElementById("container");

        let fieldsHtml = "";

        task.fields.forEach((field,index)=>{

            if(field.type === "text"){

                fieldsHtml += `
                    <div class="field">
                        <label>${field.label}</label>

                        <textarea
                            id="field${index}"
                            placeholder="ここに入力しよう"
                        ></textarea>
                    </div>
                `;
            }

            if(field.type === "photo"){

                fieldsHtml += `
                    <div class="field">
                        <label>${field.label}</label>

                        <input
                            type="file"
                            accept="image/*"
                            id="field${index}"
                        >
                    </div>
                `;
            }

        });

        container.innerHTML = `

            javascript:history.back()
               ← もどる
            </a>

            <div class="task-card">

                <div class="task-title">
                    ${task.task}
                </div>

                ${fieldsHtml}

                <button
                  class="complete-button"
                  onclick="completeChallenge()">
                  ✅ チャレンジできた！
                </button>

            </div>

        `;

    }
    catch(error){

        document.getElementById("container").innerHTML =
            `<div class="loading">${error}</div>`;

    }

}

function completeChallenge(){

    alert(
      "すごい！チャレンジをがんばったね！🌟"
    );

}

loadChallenge();

</script>

</body>
</html>
